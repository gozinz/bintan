<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Form</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        h2 { text-align: center; }
        label { display: block; margin: 10px 0 5px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0 20px; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Booking Form</h2>
        <form>
            <label for="service">Select Service:</label>
            <select id="service" name="service" required>
                <option value="haircut">Haircut</option>
                <option value="massage">Massage</option>
                <option value="facial">Facial</option>
            </select>

            <label for="date">Select Date:</label>
            <input type="date" id="date" name="date" required>

            <label for="time">Select Time:</label>
            <input type="time" id="time" name="time" required>

            <label for="name">Customer Name:</label>
            <input type="text" id="name" name="customer_name" placeholder="Enter your name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>

            <label for="duration">Duration:</label>
            <input type="text" id="duration" name="duration" placeholder="Duration in minutes" required>

            <label for="special-requests">Special Requests:</label>
            <textarea id="special-requests" name="special_requests" rows="4" placeholder="Any special requests..."></textarea>

            <button type="submit">Book Now</button>
        </form>
    </div>
</body>
</html>
